name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Build and test on multiple Java versions
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '11', '17', '21' ]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn -B clean compile --file pom.xml

    - name: Run unit tests
      run: mvn -B test --file pom.xml

    - name: Generate test coverage report
      if: matrix.java == '11'
      run: mvn -B jacoco:report --file pom.xml

    - name: Upload coverage to Codecov
      if: matrix.java == '11'
      uses: codecov/codecov-action@v4
      with:
        file: target/site/jacoco/jacoco.xml
        fail_ci_if_error: false

    - name: Package JAR
      run: mvn -B package -DskipTests --file pom.xml

    - name: Upload JAR artifact
      if: matrix.java == '11'
      uses: actions/upload-artifact@v4
      with:
        name: face-recognition-jar
        path: target/*.jar
        if-no-files-found: warn
        retention-days: 30

  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Run Checkstyle (if configured)
      run: mvn -B checkstyle:check --file pom.xml || true
      continue-on-error: true

    - name: Run SpotBugs (if configured)
      run: mvn -B spotbugs:check --file pom.xml || true
      continue-on-error: true

  # Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Run integration tests
      run: mvn -B verify -P integration-tests --file pom.xml || true
      continue-on-error: true

  # Generate documentation
  documentation:
    name: Generate Docs
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Generate Javadoc
      run: mvn -B javadoc:javadoc --file pom.xml || true
      continue-on-error: true

    - name: Upload Javadoc
      uses: actions/upload-artifact@v4
      with:
        name: javadoc
        path: target/site/apidocs/
        if-no-files-found: warn
        retention-days: 30

  # Release job (only on main branch tags)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build release JAR
      run: mvn -B clean package -DskipTests --file pom.xml

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/*.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
