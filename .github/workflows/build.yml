name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Xmx1536m -Djava.awt.headless=true

jobs:
  verify:
    name: Verify (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Maven verify (tests + Checkstyle + SpotBugs + JaCoCo)
        run: mvn -B -ntp -Pci verify

      - name: Upload coverage to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Upload JaCoCo HTML report
        if: matrix.java == '17' && always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload SpotBugs report
        if: matrix.java == '17' && always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload CycloneDX SBOM
        if: matrix.java == '17'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Spring Boot jar
        if: matrix.java == '17' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: face-recognition-jar
          path: target/face-recognition-*.jar
          if-no-files-found: warn
          retention-days: 30

  docker:
    name: Docker image build
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: face-recognition:ci

  release:
    name: Release
    needs: [verify, docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Package release jars
        run: mvn -B -ntp -DskipTests package

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/face-recognition-*.jar
            target/bom.json
            target/bom.xml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
