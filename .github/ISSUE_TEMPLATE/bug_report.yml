name: Bug report
description: Report something that's broken.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough context for someone else to reproduce the problem without guesswork.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A one-paragraph description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Steps to reproduce
      description: Minimal code, commands, or API calls that trigger the bug.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full stack trace if applicable.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: face-recognition version
      placeholder: "2.1.0 / master@<sha>"
    validations:
      required: true
  - type: input
    id: java
    attributes:
      label: Java version
      placeholder: "Temurin 17.0.11"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: How are you invoking the library?
      options:
        - Java API (library)
        - REST API
        - CLI
        - Docker image
      default: 0
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and Discussions for duplicates.
          required: true
        - label: I can reproduce this on `master` (not just an older release).
          required: false
